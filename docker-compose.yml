services:
  app:
    container_name: home-management-app
    build: ./containers/app
    env_file:
      - .env
    volumes:
      - ./volume/inventory.txt:/data/inventory.txt
    restart: unless-stopped

  proxy:
    container_name: home-nginx-proxy
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped